name: CI — Run Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ❗ REMOVE cache temporarily (to avoid stale env issues)

      - name: Install dependencies (FORCE install pytest)
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r app/requirements.txt

      - name: Verify pytest installation (DEBUG STEP)
        run: |
          python -m pytest --version

      - name: Run tests
        working-directory: app
        run: |
          python -m pytest test_app.py -v --tb=short
